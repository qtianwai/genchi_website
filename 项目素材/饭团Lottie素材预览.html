<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>饭团 Lottie 素材预览</title>
  <style>
    :root {
      --bg: #f7f1e7;
      --card: rgba(255, 255, 255, 0.92);
      --text: #3d312a;
      --muted: #806b5d;
      --border: rgba(97, 72, 52, 0.12);
      --shadow: 0 18px 45px rgba(80, 58, 39, 0.12);
      --accent: #d86f54;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 219, 176, 0.7), transparent 28%),
        radial-gradient(circle at top right, rgba(255, 195, 182, 0.55), transparent 24%),
        linear-gradient(180deg, #fff8f1 0%, var(--bg) 100%);
      color: var(--text);
    }

    .wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 34px;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .hero {
      display: grid;
      gap: 18px;
      margin-bottom: 28px;
    }

    .hero-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .hero-card img {
      display: block;
      width: 100%;
      border-radius: 18px;
      background: #fffdf9;
    }

    .hero-title {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 14px;
    }

    .hero-title strong {
      font-size: 18px;
    }

    .hero-title span {
      color: var(--accent);
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 18px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .card img {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: contain;
      border-radius: 16px;
      background: #fffdf9;
    }

    .meta {
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
    }

    .meta strong {
      font-size: 17px;
    }

    .meta code {
      color: var(--muted);
      font-size: 12px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>饭团 Lottie 素材预览</h1>
      <p>用于快速查看当前饭团角色各状态的静态预览，方便后续继续迭代。</p>
      <div class="hero-card">
        <div class="hero-title">
          <strong>总览图</strong>
          <span>饭团Lottie预览/fantuan_contact_sheet.png</span>
        </div>
        <img src="饭团Lottie预览/fantuan_contact_sheet.png" alt="饭团状态总览图" />
      </div>
    </section>

    <section class="grid">
      <article class="card">
        <img src="饭团Lottie预览/fantuan_idle.png" alt="idle" />
        <div class="meta">
          <strong>待机</strong>
          <code>fantuan_idle.png</code>
        </div>
      </article>
      <article class="card">
        <img src="饭团Lottie预览/fantuan_hungry.png" alt="hungry" />
        <div class="meta">
          <strong>饥饿</strong>
          <code>fantuan_hungry.png</code>
        </div>
      </article>
      <article class="card">
        <img src="饭团Lottie预览/fantuan_sleepy.png" alt="sleepy" />
        <div class="meta">
          <strong>困倦</strong>
          <code>fantuan_sleepy.png</code>
        </div>
      </article>
      <article class="card">
        <img src="饭团Lottie预览/fantuan_excited.png" alt="excited" />
        <div class="meta">
          <strong>兴奋</strong>
          <code>fantuan_excited.png</code>
        </div>
      </article>
      <article class="card">
        <img src="饭团Lottie预览/fantuan_rainy.png" alt="rainy" />
        <div class="meta">
          <strong>下雨</strong>
          <code>fantuan_rainy.png</code>
        </div>
      </article>
      <article class="card">
        <img src="饭团Lottie预览/fantuan_eating.png" alt="eating" />
        <div class="meta">
          <strong>吃东西</strong>
          <code>fantuan_eating.png</code>
        </div>
      </article>
      <article class="card">
        <img src="饭团Lottie预览/fantuan_happy.png" alt="happy" />
        <div class="meta">
          <strong>开心</strong>
          <code>fantuan_happy.png</code>
        </div>
      </article>
      <article class="card">
        <img src="饭团Lottie预览/fantuan_starving.png" alt="starving" />
        <div class="meta">
          <strong>极饿</strong>
          <code>fantuan_starving.png</code>
        </div>
      </article>
      <article class="card">
        <img src="饭团Lottie预览/fantuan_tap.png" alt="tap" />
        <div class="meta">
          <strong>点击反馈</strong>
          <code>fantuan_tap.png</code>
        </div>
      </article>
    </section>
  </div>
</body>
</html>
